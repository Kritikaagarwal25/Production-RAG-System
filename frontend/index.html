<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuQuery AI | RAG System</title>
    <meta name="description" content="Production-Grade Retrieval-Augmented Generation system — ask questions from your documents.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ====================== SIDEBAR ====================== -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="icon-btn" id="toggle-sidebar" title="Toggle sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <button class="icon-btn" id="new-chat-btn" title="New chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12h14"/>
            </svg>
        </button>
    </div>

    <nav class="sidebar-nav">
        <button class="nav-btn active" id="nav-chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span>Chat</span>
        </button>
        <button class="nav-btn" id="nav-docs">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            </svg>
            <span>Documents</span>
        </button>
    </nav>

    <div class="sidebar-docs-panel" id="sidebar-docs-panel">
        <!-- Upload Zone -->
        <div class="upload-area">
            <div class="drop-zone" id="drop-zone">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p>Drop PDFs here<br><span>or click to browse</span></p>
                <input type="file" id="file-input" multiple accept=".pdf" hidden>
            </div>
            <div id="file-list" class="file-list"></div>
            <button id="upload-btn" class="upload-btn" disabled>
                <span id="upload-btn-text">Process Documents</span>
                <div class="spinner" id="upload-spinner" style="display:none"></div>
            </button>
            <div id="upload-status" class="upload-status"></div>
        </div>

        <!-- Knowledge Base -->
        <div class="kb-section">
            <p class="section-label">Knowledge Base</p>
            <div id="metadata-list" class="metadata-list">
                <p class="empty-hint">No documents yet.</p>
            </div>
        </div>
    </div>

    <!-- User area -->
    <div class="sidebar-footer">
        <div class="user-chip">
            <div class="avatar">A</div>
            <span>DocuQuery AI</span>
        </div>
    </div>
</aside>

<!-- ====================== MAIN ====================== -->
<main class="main" id="main">

    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="icon-btn topbar-toggle" id="topbar-toggle-sidebar" title="Toggle sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <span class="topbar-title">DocuQuery AI</span>
        </div>
        <div class="topbar-right">
            <button class="docs-toggle-btn" id="topbar-docs-btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                </svg>
                Documents
            </button>
        </div>
    </header>

    <!-- Chat area -->
    <div class="chat-area" id="chat-area">
        <!-- Welcome screen -->
        <div class="welcome-screen" id="welcome-screen">
            <h1 class="welcome-title">What are you working on?</h1>
            <p class="welcome-sub">Upload documents in the sidebar, then ask anything about them.</p>
        </div>

        <!-- Chat messages -->
        <div class="chat-messages" id="chat-messages"></div>
    </div>

    <!-- Input bar -->
    <div class="input-wrapper">
        <div class="input-bar">
            <button class="attach-btn" id="attach-btn" title="Attach document">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </button>
            <textarea
                id="query-input"
                class="query-input"
                placeholder="Ask anything about your documents..."
                rows="1"
                autocomplete="off"
            ></textarea>
            <button id="send-btn" class="send-btn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                </svg>
            </button>
        </div>
        <p class="input-hint">DocuQuery AI can make mistakes. Verify important information.</p>
    </div>
</main>

<!-- Hidden file input for topbar attach -->
<input type="file" id="attach-file-input" multiple accept=".pdf" hidden>

<script src="script.js"></script>
</body>
</html>
